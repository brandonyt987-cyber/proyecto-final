<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Gestión de Voceros</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .btn-create { background: #1abc9c; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .btn-create:hover { background: #16a085; }
        .action-buttons { display: flex; gap: 5px; justify-content: center; }
        .btn-action-table { padding: 6px 10px; border-radius: 4px; text-decoration: none; font-size: 0.85em; font-weight: 600; color: white !important; }
        .btn-edit { background-color: #f39c12; }
        .btn-delete { background-color: #e74c3c; }
    </style>
</head>
<body>
    <div th:replace="~{dashboard :: sidebar}"></div>
    <div class="main-content">
        <header th:replace="~{dashboard :: header-top}"></header>

        <div class="dashboard-area">
            
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2>Voceros Activos</h2>
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/voceros/crear}" class="btn-create">+ Registrar Nuevo Vocero</a>
            </div>

            <div th:if="${exito}" class="alert-success-global"><span th:text="${exito}"></span></div>
            <div th:if="${error}" class="alert-error-global"><span th:text="${error}"></span></div>

            <div style="background:white; padding:20px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1);">
                <table style="width:100%; border-collapse:collapse;">
                    <thead style="background:#0077c9; color:white;">
                        <tr>
                            <th style="padding:12px; text-align:center; width: 40px;">ID</th>
                            <th style="padding:12px;">Aprendiz</th>
                            <th style="padding:12px;">Documento</th>
                            <th style="padding:12px;">Ficha / Programa</th>
                            <th sec:authorize="hasRole('ADMIN')" style="padding:12px; text-align:center;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="v : ${voceros}" style="border-bottom:1px solid #eee;">
                            
                            <td style="padding:12px; text-align:center; font-weight:bold;" th:text="${v.id}"></td>
                            <td style="padding:12px;" th:text="${v.aprendiz.nombreCompleto}"></td>
                            <td style="padding:12px;" th:text="${v.aprendiz.numeroDocumento}"></td>
                            
                            <td style="padding:12px;">
                                <div style="display:flex; flex-direction:column; align-items:flex-start;">
                                    <span style="background:#eef2f7; color:#0077c9; padding:4px 8px; border-radius:4px; font-weight:bold; margin-bottom: 4px;" 
                                          th:text="${v.aprendiz.ficha.codigo}"></span>
                                    <small style="color:#555; font-size:0.85em;" th:text="${v.aprendiz.ficha.programa}"></small>
                                </div>
                            </td>

                            <td sec:authorize="hasRole('ADMIN')" style="padding:12px; text-align:center;">
                                <div class="action-buttons">
                                    <a th:href="@{/voceros/editar/{id}(id=${v.id})}" 
                                       class="btn-action-table btn-edit">Editar</a>
                                    <a th:href="@{/voceros/eliminar/{id}(id=${v.id})}" 
                                       class="btn-action-table btn-delete"
                                       onclick="return confirm('¿Eliminar Vocero?')">Eliminar</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
