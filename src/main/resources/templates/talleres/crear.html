<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Programar Taller</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>.error-message { color: #dc3545; font-size: 0.85em; display: block; margin-top: 5px; font-weight: bold; }</style>
</head>
<body>
    <div th:replace="~{dashboard :: sidebar}"></div>
    <div class="main-content">
        <header th:replace="~{dashboard :: header-top}"></header>

        <div class="dashboard-area">
            <div class="form-container" style="margin:0 auto; max-width: 850px;">
                <h2>Programar Nuevo Taller</h2>
                
                <div th:if="${error}" class="alert-error-global"><span th:text="${error}"></span></div>

                <form method="POST" th:action="@{/talleres/guardar}" th:object="${taller}" novalidate>
                    
                    <div class="form-group">
                        <label>Nombre del Taller:</label>
                        <input type="text" th:field="*{nombreTaller}" class="form-control" placeholder="Ej: Habilidades Blandas" required>
                        <span th:errors="*{nombreTaller}" class="error-message"></span>
                    </div>

                    <div class="row" style="display:flex; gap:15px;">
                        <div class="form-group" style="flex:1;">
                            <label>Ficha / Programa:</label>
                            <select th:field="*{ficha}" class="form-control" required>
                                <option value="">-- Seleccione Ficha --</option>
                                <option th:each="f : ${listaFichas}" 
                                        th:value="${f.id}" 
                                        th:text="${f.codigo} + ' - ' + ${f.programa} + ' (' + ${f.jornada} + ')'"></option>
                            </select>
                            <span th:errors="*{ficha}" class="error-message"></span>
                        </div>
                        <div class="form-group" style="flex:1;">
                            <label>Profesional a Cargo:</label>
                            <select th:field="*{profesional.id}" class="form-control" required>
                                <option value="">-- Seleccione Profesional --</option>
                                <option th:each="p : ${listaProfesionales}" 
                                        th:value="${p.id}" 
                                        th:text="${p.nombre} + ' (' + ${p.rol} + ')'"></option>
                            </select>
                            <span th:errors="*{profesional}" class="error-message"></span>
                        </div>
                    </div>

                    <!-- AJUSTE SOLICITADO: Fecha + Cupo más juntos -->
                    <div class="row" style="display:flex; gap:10px; align-items:flex-end;">
                        <div class="form-group" style="flex:1;">
                            <label>Fecha:</label>
                            <input type="date" th:field="*{fecha}" class="form-control" 
                                   style="max-width: 170px;" 
                                   th:min="${minDate}" required>
                            <span th:errors="*{fecha}" class="error-message"></span>
                        </div>

                        <div class="form-group" style="width:120px;">
                            <label>Cupo Solicitado:</label>
                            <input type="number" th:field="*{cupo}" class="form-control" min="1" required>
                            <span th:errors="*{cupo}" class="error-message"></span>
                        </div>
                    </div>
                    <!-- FIN AJUSTE -->

                    <div class="row" style="display:flex; gap:15px;">
                        <div class="form-group" style="flex:1;">
                            <label>Hora Inicio (8am - 5pm):</label>
                            <input type="time" th:field="*{horaInicio}" class="form-control" min="08:00" max="17:00" required>
                            <span th:errors="*{horaInicio}" class="error-message"></span>
                        </div>
                        <div class="form-group" style="flex:1;">
                            <label>Hora Fin (8am - 5pm):</label>
                            <input type="time" th:field="*{horaFin}" class="form-control" min="08:00" max="17:00" required>
                            <span th:errors="*{horaFin}" class="error-message"></span>
                        </div>
                    </div>

                    <div style="margin-top:30px; display:flex; flex-direction:column; gap:15px; align-items:center;">
                        <button type="submit" class="btn-main btn-create" style="cursor:pointer; width:100%; max-width:300px; text-align:center; justify-content:center;">Guardar Taller</button>
                        <a th:href="@{/talleres}" class="btn-cancel" style="padding: 10px 20px; background-color: #6c757d; color: white; border-radius: 5px; text-decoration: none; font-weight: bold; width:100%; max-width:300px; text-align:center; box-sizing:border-box;">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
